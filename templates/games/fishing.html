<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыбалка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a4b5c, #0e6b7c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #0e6b7c;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 3px solid #7fffd4;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #7fffd4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .lake {
            background: #0a4b5c;
            border: 4px solid #7fffd4;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            position: relative;
            min-height: 300px;
        }
        .water {
            position: relative;
            height: 200px;
            overflow: hidden;
            border-radius: 15px;
        }
        .fish {
            position: absolute;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
            animation: swim 3s infinite;
        }
        @keyframes swim {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(20px) rotate(5deg); }
            75% { transform: translateX(-20px) rotate(-5deg); }
        }
        .fish:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 20px gold);
        }
        .fishing-rod {
            position: relative;
            height: 100px;
            margin-top: 20px;
        }
        .rod-line {
            width: 4px;
            height: 80px;
            background: white;
            margin: 0 auto;
            animation: bob 2s infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
        .hook {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffd700;
            margin: -5px auto 0;
            animation: bob 2s infinite;
        }
        .inventory {
            background: #0a4b5c;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .fish-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .fish-item {
            background: #0e6b7c;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #7fffd4;
            font-size: 1.2rem;
        }
        .score {
            font-size: 2rem;
            color: #ffd700;
            margin: 10px 0;
        }
        .action-btn {
            background: #7fffd4;
            color: #0a4b5c;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(127,255,212,0.3);
        }
        .back-btn {
            background: transparent;
            color: #7fffd4;
            border: 2px solid #7fffd4;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎣 Рыбалка</h1>
        
        <div class="lake">
            <div class="water" id="water">
                <!-- Рыбы будут добавляться сюда -->
            </div>
            
            <div class="fishing-rod">
                <div class="rod-line"></div>
                <div class="hook"></div>
            </div>
        </div>
        
        <div class="score">💰 Очки: <span id="score">0</span></div>
        
        <div class="inventory">
            <h3>🎣 Мой улов:</h3>
            <div class="fish-list" id="inventory"></div>
        </div>
        
        <button class="action-btn" onclick="castLine()">🎣 Забросить удочку</button>
        <button class="action-btn" onclick="resetFishing()">🔄 Новая рыбалка</button>
        <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let score = 0;
        let inventory = [];
        let fishInterval;
        
        const fishTypes = [
            { name: '🐟 Плотва', points: 10, emoji: '🐟', rarity: 0.5 },
            { name: '🐠 Карась', points: 20, emoji: '🐠', rarity: 0.3 },
            { name: '🐡 Окунь', points: 30, emoji: '🐡', rarity: 0.15 },
            { name: '🐋 Сом', points: 50, emoji: '🐋', rarity: 0.05 },
            { name: '👑 Золотая рыбка', points: 100, emoji: '👑', rarity: 0.02 }
        ];

        function castLine() {
            // Удаляем старых рыб
            document.getElementById('water').innerHTML = '';
            
            // Создаем новых рыб
            for (let i = 0; i < 5; i++) {
                createFish();
            }
            
            // Показываем сообщение
            const message = document.createElement('div');
            message.textContent = '🎣 Клюёт! Лови!';
            message.style.color = '#7fffd4';
            message.style.fontSize = '1.5rem';
            message.style.margin = '10px';
            document.querySelector('.lake').appendChild(message);
            
            setTimeout(() => message.remove(), 2000);
        }

        function createFish() {
            const water = document.getElementById('water');
            const fish = document.createElement('div');
            fish.className = 'fish';
            
            // Случайный тип рыбы
            const rand = Math.random();
            let cumulative = 0;
            let selectedFish = fishTypes[0];
            
            for (let fishType of fishTypes) {
                cumulative += fishType.rarity;
                if (rand < cumulative) {
                    selectedFish = fishType;
                    break;
                }
            }
            
            fish.textContent = selectedFish.emoji;
            fish.setAttribute('data-name', selectedFish.name);
            fish.setAttribute('data-points', selectedFish.points);
            
            // Случайная позиция
            fish.style.left = Math.random() * 90 + '%';
            fish.style.top = Math.random() * 80 + '%';
            
            fish.onclick = () => catchFish(fish, selectedFish);
            
            water.appendChild(fish);
            
            // Рыба уплывает через 3 секунды
            setTimeout(() => {
                if (fish.parentNode) {
                    fish.remove();
                }
            }, 3000);
        }

        function catchFish(fish, fishType) {
            score += fishType.points;
            inventory.push(fishType.name);
            
            document.getElementById('score').textContent = score;
            updateInventory();
            
            // Анимация ловли
            fish.style.animation = 'none';
            fish.style.transform = 'translateY(-50px)';
            fish.style.opacity = '0';
            
            setTimeout(() => fish.remove(), 300);
            
            // Вибрация
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
            
            // Создаем новую рыбу
            setTimeout(createFish, 500);
        }

        function updateInventory() {
            const inventoryDiv = document.getElementById('inventory');
            inventoryDiv.innerHTML = '';
            
            // Показываем последние 5 рыб
            const recentFish = inventory.slice(-5);
            
            recentFish.forEach(fish => {
                const item = document.createElement('div');
                item.className = 'fish-item';
                item.textContent = fish;
                inventoryDiv.appendChild(item);
            });
        }

        function resetFishing() {
            score = 0;
            inventory = [];
            document.getElementById('score').textContent = '0';
            document.getElementById('water').innerHTML = '';
            updateInventory();
        }

        function closeGame() {
            tg.close();
        }

        // Автоматически забрасываем удочку при загрузке
        castLine();
    </script>
</body>
</html>
