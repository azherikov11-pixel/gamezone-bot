<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1e24, #2a2f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #242a32;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #8b9dc3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            perspective: 600px;
        }
        .dice {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
            cursor: pointer;
        }
        .dice-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 3px solid #8b9dc3;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #1a1e24;
            backface-visibility: visible;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .dice-face-1 { transform: rotateY(0deg) translateZ(50px); }
        .dice-face-2 { transform: rotateY(90deg) translateZ(50px); }
        .dice-face-3 { transform: rotateY(180deg) translateZ(50px); }
        .dice-face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .dice-face-5 { transform: rotateX(90deg) translateZ(50px); }
        .dice-face-6 { transform: rotateX(-90deg) translateZ(50px); }
        
        @keyframes roll {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(720deg) rotateY(720deg); }
        }
        
        .rolling {
            animation: roll 1s ease-out;
        }
        
        .score {
            font-size: 2rem;
            margin: 20px 0;
            color: #ffd700;
        }
        
        .total-score {
            font-size: 1.5rem;
            color: #8b9dc3;
            margin: 20px 0;
        }
        
        button {
            background: #8b9dc3;
            color: #1a1e24;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        button:hover {
            background: #aab9d4;
            transform: translateY(-2px);
        }
        .back-btn {
            background: transparent;
            color: #8b9dc3;
            border: 2px solid #8b9dc3;
        }
        .history {
            margin-top: 20px;
            padding: 15px;
            background: #1a1e24;
            border-radius: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            padding: 5px;
            border-bottom: 1px solid #3a404a;
            color: #a0aaba;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎲 Кости</h1>
        <p>Брось кубики и набери 21!</p>
        
        <div class="dice-container">
            <div class="dice" id="dice1" onclick="rollDie(1)">
                <div class="dice-face dice-face-1">⚀</div>
                <div class="dice-face dice-face-2">⚁</div>
                <div class="dice-face dice-face-3">⚂</div>
                <div class="dice-face dice-face-4">⚃</div>
                <div class="dice-face dice-face-5">⚄</div>
                <div class="dice-face dice-face-6">⚅</div>
            </div>
            <div class="dice" id="dice2" onclick="rollDie(2)">
                <div class="dice-face dice-face-1">⚀</div>
                <div class="dice-face dice-face-2">⚁</div>
                <div class="dice-face dice-face-3">⚂</div>
                <div class="dice-face dice-face-4">⚃</div>
                <div class="dice-face dice-face-5">⚄</div>
                <div class="dice-face dice-face-6">⚅</div>
            </div>
        </div>
        
        <div class="score" id="currentScore">0</div>
        <div class="total-score">Всего очков: <span id="totalScore">0</span></div>
        
        <button onclick="rollBoth()">🎲 Бросить оба</button>
        <button onclick="resetGame()">🔄 Новая игра</button>
        <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
        
        <div class="history" id="history"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentScore = 0;
        let totalScore = 0;
        let history = [];
        
        const diceValues = [1, 2, 3, 4, 5, 6];
        const diceElements = {
            1: document.getElementById('dice1'),
            2: document.getElementById('dice2')
        };
        
        function rollDie(dieNum) {
            if (currentScore >= 21) return;
            
            const die = diceElements[dieNum];
            die.classList.add('rolling');
            
            setTimeout(() => {
                die.classList.remove('rolling');
                const value = Math.floor(Math.random() * 6) + 1;
                setDieFace(die, value);
                
                currentScore += value;
                document.getElementById('currentScore').textContent = currentScore;
                
                checkGameOver();
            }, 1000);
        }
        
        function rollBoth() {
            if (currentScore >= 21) return;
            
            Object.values(diceElements).forEach(die => die.classList.add('rolling'));
            
            setTimeout(() => {
                Object.values(diceElements).forEach(die => die.classList.remove('rolling'));
                
                const val1 = Math.floor(Math.random() * 6) + 1;
                const val2 = Math.floor(Math.random() * 6) + 1;
                
                setDieFace(diceElements[1], val1);
                setDieFace(diceElements[2], val2);
                
                currentScore += val1 + val2;
                document.getElementById('currentScore').textContent = currentScore;
                
                checkGameOver();
            }, 1000);
        }
        
        function setDieFace(die, value) {
            let rotation = '';
            switch(value) {
                case 1: rotation = 'rotateY(0deg)'; break;
                case 2: rotation = 'rotateY(90deg)'; break;
                case 3: rotation = 'rotateY(180deg)'; break;
                case 4: rotation = 'rotateY(-90deg)'; break;
                case 5: rotation = 'rotateX(90deg)'; break;
                case 6: rotation = 'rotateX(-90deg)'; break;
            }
            die.style.transform = rotation;
        }
        
        function checkGameOver() {
            if (currentScore === 21) {
                totalScore += 100;
                addToHistory('🎉 ПОБЕДА! +100 очков');
                setTimeout(() => {
                    alert('🎉 ПОЗДРАВЛЯЮ! Ты набрал ровно 21! +100 очков');
                }, 100);
            } else if (currentScore > 21) {
                totalScore -= 50;
                addToHistory('💔 Перебор! -50 очков');
                setTimeout(() => {
                    alert('😢 Перебор! -50 очков');
                }, 100);
            }
            
            document.getElementById('totalScore').textContent = totalScore;
            
            if (currentScore >= 21) {
                setTimeout(() => {
                    if (confirm('Игра окончена! Начать новую?')) {
                        resetGame();
                    }
                }, 500);
            }
        }
        
        function addToHistory(text) {
            history.unshift(text);
            if (history.length > 5) history.pop();
            
            const historyEl = document.getElementById('history');
            historyEl.innerHTML = history.map(item => 
                `<div class="history-item">${item}</div>`
            ).join('');
        }
        
        function resetGame() {
            currentScore = 0;
            document.getElementById('currentScore').textContent = '0';
            setDieFace(diceElements[1], 1);
            setDieFace(diceElements[2], 1);
        }
        
        function closeGame() {
            tg.close();
        }
    </script>
</body>
</html>
