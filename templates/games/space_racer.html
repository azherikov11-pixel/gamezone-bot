<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космо-рейсер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            text-align: center;
            border: 2px solid #00ffff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            background: #0a0f1e;
            width: 100%;
            max-width: 400px;
            height: auto;
            touch-action: none;
        }
        .score {
            font-size: 2rem;
            margin: 15px 0;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #2a2f3a;
            border: 3px solid #00ffff;
            color: #00ffff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .control-btn:active {
            background: #00ffff;
            color: #1a1f2e;
            transform: scale(0.9);
        }
        button {
            background: #00ffff;
            color: #1a1f2e;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #00ffff;
        }
        .back-btn {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #00ffff;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🚀 Космо-рейсер</h1>
        
        <div class="score">Счет: <span id="score">0</span></div>
        
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="controls">
            <div class="control-btn" id="leftBtn">←</div>
            <div class="control-btn" id="rightBtn">→</div>
        </div>
        
        <div>
            <button onclick="startGame()">🔄 Новая игра</button>
            <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Игра окончена!</h2>
        <p id="finalScore" style="font-size: 2rem; margin: 20px;"></p>
        <button onclick="startGame()">Играть снова</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let animationId;
        
        // Игрок
        let player = {
            x: 200,
            y: 500,
            width: 40,
            height: 40,
            speed: 8
        };
        
        // Астероиды
        let asteroids = [];
        const asteroidSpeed = 3;
        
        // Звезды для фона
        let stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3,
                speed: Math.random() * 2 + 1
            });
        }

        function drawPlayer() {
            // Рисуем космический корабль
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
            
            // Треугольник корабля
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 20, player.y + 10);
            ctx.lineTo(player.x - 8, player.y + 10);
            ctx.lineTo(player.x - 8, player.y + 20);
            ctx.lineTo(player.x + 8, player.y + 20);
            ctx.lineTo(player.x + 8, player.y + 10);
            ctx.lineTo(player.x + 20, player.y + 10);
            ctx.closePath();
            ctx.fill();
            
            // Огонь из двигателя
            if (Math.random() > 0.5) {
                ctx.fillStyle = '#ffaa00';
                ctx.shadowColor = '#ffaa00';
                ctx.beginPath();
                ctx.moveTo(player.x - 5, player.y + 20);
                ctx.lineTo(player.x, player.y + 30);
                ctx.lineTo(player.x + 5, player.y + 20);
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
        }

        function drawAsteroids() {
            asteroids.forEach(asteroid => {
                ctx.fillStyle = '#8b4513';
                ctx.shadowColor = '#ff4500';
                ctx.shadowBlur = 10;
                
                ctx.beginPath();
                ctx.arc(asteroid.x, asteroid.y, asteroid.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Кратеры
                ctx.fillStyle = '#5d3a1a';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(asteroid.x - 5, asteroid.y - 5, asteroid.size / 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function drawStars() {
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.5})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Движение звезд
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function update() {
            if (!gameRunning) return;
            
            // Создаем новые астероиды
            if (Math.random() < 0.02) {
                asteroids.push({
                    x: Math.random() * canvas.width,
                    y: -30,
                    size: Math.random() * 15 + 10,
                    speed: asteroidSpeed + Math.random() * 2
                });
            }
            
            // Двигаем астероиды
            asteroids = asteroids.filter(asteroid => {
                asteroid.y += asteroid.speed;
                
                // Проверка столкновения
                const dx = player.x - asteroid.x;
                const dy = (player.y - 10) - asteroid.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < asteroid.size + 15) {
                    gameRunning = false;
                    showGameOver();
                }
                
                // Увеличиваем счет за пролетевшие астероиды
                if (asteroid.y > canvas.height) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    return false;
                }
                
                return true;
            });
        }

        function draw() {
            // Очищаем canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем звезды
            drawStars();
            
            // Рисуем астероиды
            drawAsteroids();
            
            // Рисуем игрока
            drawPlayer();
            
            if (gameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function gameLoop() {
            update();
            draw();
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            player.x = 200;
            asteroids = [];
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();
        }

        function showGameOver() {
            document.getElementById('finalScore').textContent = `Счет: ${score}`;
            document.getElementById('gameOver').style.display = 'block';
        }

        // Управление с клавиатуры
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            if (e.key === 'ArrowLeft' && player.x > 30) {
                player.x -= player.speed;
            } else if (e.key === 'ArrowRight' && player.x < canvas.width - 30) {
                player.x += player.speed;
            }
        });

        // Управление кнопками
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (gameRunning && player.x > 30) {
                player.x -= player.speed;
            }
        });
        
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (gameRunning && player.x < canvas.width - 30) {
                player.x += player.speed;
            }
        });

        // Управление касанием для мобильных
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touchX = (touch.clientX - rect.left) * scaleX;
            
            if (touchX > 30 && touchX < canvas.width - 30) {
                player.x = touchX;
            }
        });

        function closeGame() {
            tg.close();
        }

        // Стартуем игру автоматически
        startGame();
    </script>
</body>
</html>
