<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слот-машина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c1810, #4a2a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #4a2a1a;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 3px solid #ffd700;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .slot-machine {
            background: #2c1810;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #8b4513;
            margin: 20px 0;
        }
        .reels {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .reel {
            width: 100px;
            height: 120px;
            background: white;
            border-radius: 15px;
            border: 3px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, #f0f0f0, #ffffff);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .reel.spinning {
            animation: spin 0.2s infinite;
        }
        @keyframes spin {
            0% { transform: translateY(0); }
            25% { transform: translateY(-5px); }
            75% { transform: translateY(5px); }
            100% { transform: translateY(0); }
        }
        .balance {
            font-size: 2rem;
            color: #ffd700;
            margin: 15px 0;
        }
        .bet-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .bet-btn {
            background: #8b4513;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .bet-btn:hover {
            background: #a0522d;
            transform: scale(1.05);
        }
        .paylines {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .payline {
            background: rgba(255,215,0,0.2);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ffd700;
        }
        .action-btn {
            background: #ffd700;
            color: #2c1810;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .back-btn {
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .win-message {
            font-size: 2rem;
            color: #ffd700;
            animation: winPulse 0.5s infinite;
            margin: 20px 0;
        }
        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎰 Слот-машина</h1>
        
        <div class="balance">💰 Баланс: <span id="balance">1000</span></div>
        
        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
            
            <div class="bet-controls">
                <button class="bet-btn" onclick="changeBet(-10)">-10</button>
                <span style="font-size: 1.5rem; margin: 0 15px;">Ставка: <span id="bet">10</span></span>
                <button class="bet-btn" onclick="changeBet(10)">+10</button>
            </div>
        </div>
        
        <div class="paylines">
            <div class="payline">🍒 🍒 🍒 = x5</div>
            <div class="payline">🍋 🍋 🍋 = x10</div>
            <div class="payline">💎 💎 💎 = x20</div>
            <div class="payline">7 7 7 = x50</div>
        </div>
        
        <button class="action-btn" onclick="spin()" id="spinBtn">🎰 КРУТИТЬ!</button>
        <button class="action-btn" onclick="resetSlots()">🔄 Новая игра</button>
        <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
        
        <div id="winMessage" class="win-message" style="display: none;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let balance = 1000;
        let bet = 10;
        let isSpinning = false;
        
        const symbols = ['🍒', '🍋', '💎', '7'];
        const multipliers = {
            '🍒': 5,
            '🍋': 10,
            '💎': 20,
            '7': 50
        };

        function changeBet(amount) {
            const newBet = bet + amount;
            if (newBet >= 10 && newBet <= balance && newBet <= 100) {
                bet = newBet;
                document.getElementById('bet').textContent = bet;
            }
        }

        function spin() {
            if (isSpinning) return;
            if (bet > balance) {
                alert('Недостаточно средств!');
                return;
            }
            
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            
            balance -= bet;
            document.getElementById('balance').textContent = balance;
            
            // Анимация вращения
            const reels = [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3')
            ];
            
            reels.forEach(reel => reel.classList.add('spinning'));
            
            // Генерация результатов
            const results = [];
            const spinInterval = setInterval(() => {
                reels.forEach((reel, index) => {
                    if (!results[index]) {
                        reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                });
            }, 100);
            
            setTimeout(() => {
                clearInterval(spinInterval);
                
                for (let i = 0; i < 3; i++) {
                    results[i] = symbols[Math.floor(Math.random() * symbols.length)];
                }
                
                reels.forEach((reel, index) => {
                    reel.classList.remove('spinning');
                    reel.textContent = results[index];
                });
                
                // Проверка выигрыша
                if (results[0] === results[1] && results[1] === results[2]) {
                    const multiplier = multipliers[results[0]];
                    const winAmount = bet * multiplier;
                    balance += winAmount;
                    
                    document.getElementById('balance').textContent = balance;
                    
                    const winMsg = document.getElementById('winMessage');
                    winMsg.textContent = `🎉 ВЫИГРЫШ! +${winAmount}`;
                    winMsg.style.display = 'block';
                    
                    setTimeout(() => winMsg.style.display = 'none', 3000);
                }
                
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 2000);
        }

        function resetSlots() {
            balance = 1000;
            bet = 10;
            isSpinning = false;
            
            document.getElementById('balance').textContent = balance;
            document.getElementById('bet').textContent = bet;
            document.getElementById('spinBtn').disabled = false;
            
            document.getElementById('reel1').textContent = '🍒';
            document.getElementById('reel2').textContent = '🍒';
            document.getElementById('reel3').textContent = '🍒';
            
            document.getElementById('winMessage').style.display = 'none';
        }

        function closeGame() {
            tg.close();
        }
    </script>
</body>
</html>
