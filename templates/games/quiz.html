<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4a148c, #6a1b9a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #6a1b9a;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 3px solid #ffd700;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .question-box {
            background: #4a148c;
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }
        .question {
            font-size: 1.5rem;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .options {
            display: grid;
            gap: 15px;
        }
        .option {
            background: #8e44ad;
            color: white;
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .option:hover {
            background: #9b59b6;
            transform: translateX(10px);
        }
        .option.correct {
            background: #27ae60;
            animation: correctPulse 0.5s;
        }
        .option.wrong {
            background: #c0392b;
            animation: wrongShake 0.5s;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .score {
            font-size: 2rem;
            margin: 20px 0;
            color: #ffd700;
        }
        .progress {
            width: 100%;
            height: 10px;
            background: #4a148c;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #ffd700;
            transition: width 0.3s;
        }
        button {
            background: #ffd700;
            color: #4a148c;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }
        .back-btn {
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧠 Викторина</h1>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        
        <div class="score">Очки: <span id="score">0</span></div>
        
        <div class="question-box">
            <div class="question" id="question">Загрузка...</div>
            <div class="options" id="options"></div>
        </div>
        
        <button onclick="nextQuestion()" id="nextBtn" style="display: none;">➡️ Следующий вопрос</button>
        <button onclick="restartQuiz()">🔄 Начать заново</button>
        <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const questions = [
            {
                question: "Столица Франции?",
                options: ["Лондон", "Берлин", "Париж", "Мадрид"],
                correct: 2
            },
            {
                question: "Сколько планет в Солнечной системе?",
                options: ["7", "8", "9", "10"],
                correct: 1
            },
            {
                question: "Кто написал 'Война и мир'?",
                options: ["Достоевский", "Толстой", "Пушкин", "Чехов"],
                correct: 1
            },
            {
                question: "Какой газ необходим для дыхания?",
                options: ["Углекислый газ", "Кислород", "Азот", "Водород"],
                correct: 1
            },
            {
                question: "Сколько цветов в радуге?",
                options: ["5", "6", "7", "8"],
                correct: 2
            },
            {
                question: "Самое большое животное на Земле?",
                options: ["Слон", "Синий кит", "Жираф", "Бегемот"],
                correct: 1
            },
            {
                question: "Из чего делают бензин?",
                options: ["Из воды", "Из нефти", "Из газа", "Из угля"],
                correct: 1
            },
            {
                question: "Какой язык самый распространенный в мире?",
                options: ["Английский", "Испанский", "Китайский", "Русский"],
                correct: 2
            },
            {
                question: "Сколько континентов на Земле?",
                options: ["5", "6", "7", "8"],
                correct: 1
            },
            {
                question: "Кто изобрел телефон?",
                options: ["Эдисон", "Белл", "Тесла", "Маркони"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = `${index + 1}. ${option}`;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('nextBtn').style.display = 'none';
            answered = false;
            
            // Обновляем прогресс
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function checkAnswer(selectedIndex) {
            if (answered) return;
            
            answered = true;
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            // Подсвечиваем правильный и неправильный ответы
            options.forEach((option, index) => {
                option.classList.add('disabled');
                if (index === q.correct) {
                    option.classList.add('correct');
                } else if (index === selectedIndex && index !== q.correct) {
                    option.classList.add('wrong');
                }
            });
            
            // Начисляем очки
            if (selectedIndex === q.correct) {
                score += 10;
                document.getElementById('score').textContent = score;
            }
            
            // Показываем кнопку "Далее"
            if (currentQuestion < questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                // Это был последний вопрос
                setTimeout(() => {
                    alert(`🎉 Викторина завершена! Твой результат: ${score} очков из ${questions.length * 10}`);
                }, 500);
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('score').textContent = '0';
            loadQuestion();
        }

        function closeGame() {
            tg.close();
        }

        // Загружаем первый вопрос
        loadQuestion();
    </script>
</body>
</html>
