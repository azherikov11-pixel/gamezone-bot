<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рисовалка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-container {
            background: #34495e;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 800px;
            border: 3px solid #3498db;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #3498db;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .drawing-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        canvas {
            background: white;
            border-radius: 15px;
            border: 4px solid #3498db;
            cursor: crosshair;
            touch-action: none;
        }
        .tools {
            background: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            min-width: 150px;
        }
        .color-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color:hover {
            transform: scale(1.1);
        }
        .color.selected {
            border: 4px solid #ffd700;
            transform: scale(1.1);
        }
        .brush-size {
            margin: 15px 0;
        }
        input[type=range] {
            width: 100%;
        }
        .word-display {
            font-size: 2.5rem;
            margin: 20px;
            color: #ffd700;
            letter-spacing: 10px;
        }
        .score {
            font-size: 1.5rem;
            color: #ffd700;
        }
        .action-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52,152,219,0.3);
        }
        .back-btn {
            background: transparent;
            color: #3498db;
            border: 2px solid #3498db;
        }
        .guess-input {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .guess-input input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #3498db;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎨 Рисовалка</h1>
        
        <div class="word-display" id="wordDisplay">_ _ _ _ _</div>
        <div class="score">Очки: <span id="score">0</span></div>
        
        <div class="drawing-area">
            <canvas id="drawCanvas" width="400" height="400"></canvas>
            
            <div class="tools">
                <h3>Инструменты</h3>
                
                <div class="color-picker" id="colorPicker">
                    <div class="color" style="background: black;" onclick="setColor('black')"></div>
                    <div class="color" style="background: red;" onclick="setColor('red')"></div>
                    <div class="color" style="background: blue;" onclick="setColor('blue')"></div>
                    <div class="color" style="background: green;" onclick="setColor('green')"></div>
                    <div class="color" style="background: yellow;" onclick="setColor('yellow')"></div>
                    <div class="color" style="background: purple;" onclick="setColor('purple')"></div>
                </div>
                
                <div class="brush-size">
                    <div>Размер кисти: <span id="brushSize">5</span></div>
                    <input type="range" min="1" max="20" value="5" onchange="setBrushSize(this.value)">
                </div>
                
                <button class="action-btn" onclick="clearCanvas()">🧹 Очистить</button>
                
                <div class="guess-input">
                    <input type="text" id="guessInput" placeholder="Твой ответ">
                    <button class="action-btn" onclick="makeGuess()">➡️</button>
                </div>
            </div>
        </div>
        
        <button class="action-btn" onclick="newWord()">🆕 Новое слово</button>
        <button class="back-btn" onclick="closeGame()">⬅️ Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        
        let drawing = false;
        let currentColor = 'black';
        let currentBrushSize = 5;
        let score = 0;
        
        const words = [
            'КОТ', 'СОБАКА', 'ДОМ', 'МАШИНА', 'ДЕРЕВО',
            'СОЛНЦЕ', 'ЦВЕТОК', 'РЫБА', 'ПТИЦА', 'ЗОНТ',
            'ЧАСЫ', 'КНИГА', 'МЯЧ', 'ЗВЕЗДА', 'СЕРДЦЕ'
        ];
        
        let currentWord = words[Math.floor(Math.random() * words.length)];

        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function startDrawing(e) {
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            
            ctx.lineWidth = currentBrushSize;
            ctx.lineTo(x, y);
            ctx.strokeStyle = currentColor;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function setColor(color) {
            currentColor = color;
            
            document.querySelectorAll('.color').forEach(c => {
                c.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function setBrushSize(size) {
            currentBrushSize = size;
            document.getElementById('brushSize').textContent = size;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            initCanvas();
        }

        function updateWordDisplay() {
            let display = '';
            for (let i = 0; i < currentWord.length; i++) {
                display += '_ ';
            }
            document.getElementById('wordDisplay').textContent = display;
        }

        function makeGuess() {
            const guess = document.getElementById('guessInput').value.toUpperCase();
            
            if (guess === currentWord) {
                score += 10;
                document.getElementById('score').textContent = score;
                alert('🎉 Правильно! +10 очков');
                newWord();
            } else {
                alert('😢 Не угадал');
            }
            
            document.getElementById('guessInput').value = '';
        }

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            updateWordDisplay();
            clearCanvas();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        function closeGame() {
            tg.close();
        }

        initCanvas();
        updateWordDisplay();
    </script>
</body>
</html>
